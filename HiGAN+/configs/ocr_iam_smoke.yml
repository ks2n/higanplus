device: 'cuda:0'
model: 'recognize_model'
dataset: 'iam_word'
seed: 123456
img_height: 64

# Smoke config: verify OCR Recognizer training pipeline runs.
# 2 epochs x 20 iters at batch=32 (down from 128 to fit small GPUs).

training:
  dset_name: 'iam_word'
  resume: ''
  dset_split: 'trnval'
  augment: True
  epochs: 2
  lr_policy: 'linear'
  start_decay_epoch: 1
  n_epochs_decay: 1
  batch_size: 32
  lr: 1.0e-3
  print_iter_val: 5
  start_save_epoch_val: 99
  save_epoch_val: 1
  ckpt_dir: 'ckpts'
  n_class: 80
  sort_input: true
  pretrained_backbone: ''
  max_iters_per_epoch: 20

valid:
  dset_name: 'iam_word'
  dset_split: 'test'
  batch_size: 64
  n_class: 80
  ctcdecode:
    model_path: ~
    blank_id: 0
    alpha: 1
    beta: 3
    beam_width: 32
    cutoff_prob: 0.9999
    cutoff_top_n: 32
    num_processes: 8

OcrModel:
  resolution: 16
  max_dim: 256
  in_channel: 1
  norm: 'bn'
  init: 'none'
  dropout: 0.2
  n_class: 80
  rnn_depth: 2
  bidirectional: True
